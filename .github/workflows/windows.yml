name: Build Windows

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: apps/windows
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Tesseract OCR
        shell: pwsh
        run: choco install tesseract -y --no-progress

      - name: Validate Python
        run: |
          python -m py_compile apps/windows/app.py
          python -m pytest -q tests/test_windows_ocr_blocks.py

      - name: Build exe
        working-directory: apps/windows
        run: |
          pyinstaller --noconfirm --clean --distpath ../../dist/windows --workpath build nailong_windows.spec

      - name: Package exe
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Compress-Archive -Path dist/windows/* -DestinationPath release/nailong-windows.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nailong-windows
          path: release/nailong-windows.zip
