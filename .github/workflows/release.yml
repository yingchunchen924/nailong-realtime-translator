name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true
        default: "v0.1.0"

permissions:
  contents: write

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK
        run: |
          yes | sdkmanager --licenses
          sdkmanager --install "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Build APK
        run: gradle :apps:android:assembleDebug -Pnailong.compileSdk=35 -Pnailong.targetSdk=35 --no-daemon

      - name: Package APK
        run: |
          mkdir -p release
          cp apps/android/build/outputs/apk/debug/*.apk release/nailong-android-debug.apk
          cd release
          zip nailong-android-debug.zip nailong-android-debug.apk

      - name: Upload Android package
        uses: actions/upload-artifact@v4
        with:
          name: nailong-android-debug
          path: release/nailong-android-debug.zip

  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: apps/windows
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Tesseract OCR
        shell: pwsh
        run: choco install tesseract -y --no-progress

      - name: Validate Python
        run: |
          python -m py_compile apps/windows/app.py
          python -m pytest -q tests/test_windows_ocr_blocks.py

      - name: Build exe
        working-directory: apps/windows
        run: |
          pyinstaller --noconfirm --clean --distpath ../../dist/windows --workpath build nailong_windows.spec

      - name: Package exe
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Compress-Archive -Path dist/windows/* -DestinationPath release/nailong-windows.zip -Force

      - name: Upload Windows package
        uses: actions/upload-artifact@v4
        with:
          name: nailong-windows
          path: release/nailong-windows.zip

  publish:
    needs: [android, windows]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          path: release

      - name: Prepare release files
        run: |
          mkdir -p dist
          cp release/nailong-android-debug/nailong-android-debug.zip dist/
          cp release/nailong-windows/nailong-windows.zip dist/
          git archive --format=zip --prefix=nailong-realtime-translator/ --output=dist/nailong-realtime-translator-source.zip HEAD

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: 奶龙实时翻译 ${{ github.event.inputs.tag || github.ref_name }}
          files: dist/*.zip
          generate_release_notes: true
